# Pin Node versions: tap@14 breaks on current "latest" Node (e.g. v26); caller-path/treport crash.
# Match exercised Node lines with GitHub Actions / legacy tar v4.
language: node_js
os: linux
dist: focal
node_js:
  - "8"
  - "10"
  - "12"
  - "14"
cache:
  npm: true
install:
  - npm ci
script:
  - npm test
